# NOTE: This workflow requires LinkedIn secrets (LINKEDIN_CLIENT_ID,
# LINKEDIN_CLIENT_SECRET, LINKEDIN_ACCESS_TOKEN) to validate auth.
# Run manually to confirm your LinkedIn integration is working.
name: LinkedIn Auth Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate LinkedIn auth
        env:
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: |
          python -c "
          from src.linkedin.client import LinkedInClient
          client = LinkedInClient()
          client.ensure_access_token()
          urn = client.get_person_urn()
          print(f'Auth OK: {urn}')
          "
